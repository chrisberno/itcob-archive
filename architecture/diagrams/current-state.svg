<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <!-- Broken/warning pattern -->
    <pattern id="brokenHash" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0 8L8 0" stroke="#ef444433" stroke-width="1"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="900"/><line x1="60" y1="0" x2="60" y2="900"/>
    <line x1="120" y1="0" x2="120" y2="900"/><line x1="180" y1="0" x2="180" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="900"/><line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="360" y1="0" x2="360" y2="900"/><line x1="420" y1="0" x2="420" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/><line x1="540" y1="0" x2="540" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/><line x1="660" y1="0" x2="660" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/><line x1="780" y1="0" x2="780" y2="900"/>
    <line x1="840" y1="0" x2="840" y2="900"/><line x1="900" y1="0" x2="900" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/><line x1="1020" y1="0" x2="1020" y2="900"/>
    <line x1="1080" y1="0" x2="1080" y2="900"/><line x1="1140" y1="0" x2="1140" y2="900"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="660" x2="1200" y2="660"/><line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="0" y1="780" x2="1200" y2="780"/><line x1="0" y1="840" x2="1200" y2="840"/>
  </g>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f9fafb" font-size="22" font-weight="700" letter-spacing="2">CURRENT STATE: "THE DIARY"</text>
  <text x="600" y="64" text-anchor="middle" fill="#6b7280" font-size="13" letter-spacing="1">FLAT MEMORY · NO TIERS · NO SYNTHESIS · LEVEL 1 ONLY</text>
  <line x1="200" y1="76" x2="1000" y2="76" stroke="#1f2937" stroke-width="1"/>

  <!-- ═══════════════ CEO ═══════════════ -->
  <g transform="translate(600, 120)">
    <rect x="-100" y="-24" width="200" height="48" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="600" letter-spacing="1">CEO (HUMAN)</text>
    <text x="0" y="16" text-anchor="middle" fill="#64748b" font-size="9">"What's going on?"</text>
  </g>

  <!-- Pull-only arrow from CEO down -->
  <line x1="600" y1="144" x2="600" y2="188" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="618" y="172" fill="#6b7280" font-size="9" font-style="italic">manual query</text>

  <!-- ═══════════════ SPOK LAYER ═══════════════ -->
  <g transform="translate(600, 220)">
    <!-- Container -->
    <rect x="-280" y="-28" width="560" height="56" rx="4" fill="none" stroke="#fbbf2433" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="-260" y="-32" fill="#fbbf24" font-size="9" font-weight="600" letter-spacing="1" opacity="0.6">SPOK LAYER — ECHO CHAMBER</text>

    <!-- SPOK.1 -->
    <rect x="-250" y="-18" width="140" height="36" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
    <text x="-180" y="4" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">SPOK.1</text>

    <!-- SPOK.2 -->
    <rect x="-70" y="-18" width="140" height="36" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">SPOK.2</text>

    <!-- SPOK.O -->
    <rect x="110" y="-18" width="140" height="36" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
    <text x="180" y="4" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">SPOK.O</text>

    <!-- Echo arrows between SPOKs -->
    <path d="M-100,0 C-85,-20 -15,-20 0,0" fill="none" stroke="#ef444466" stroke-width="1" stroke-dasharray="3,2"/>
    <path d="M0,0 C15,-20 95,-20 110,0" fill="none" stroke="#ef444466" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Echo chamber warning -->
  <g transform="translate(960, 218)">
    <rect x="-8" y="-8" width="16" height="16" rx="8" fill="#ef4444" opacity="0.2"/>
    <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">⚠</text>
    <text x="20" y="1" fill="#ef4444" font-size="9" font-weight="500">Same context</text>
    <text x="20" y="12" fill="#ef4444" font-size="9" font-weight="500">Same models</text>
    <text x="20" y="23" fill="#ef4444" font-size="9" font-weight="500">Same orientation</text>
  </g>

  <!-- Arrows from all SPOKs down to brain -->
  <line x1="420" y1="248" x2="420" y2="330" stroke="#4b5563" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="600" y1="248" x2="600" y2="330" stroke="#4b5563" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="780" y1="248" x2="780" y2="330" stroke="#4b5563" stroke-width="1" marker-end="url(#arrowGray)"/>

  <!-- Read/Write labels -->
  <text x="405" y="290" fill="#6b7280" font-size="8" text-anchor="end">read/write</text>
  <text x="615" y="290" fill="#6b7280" font-size="8">read/write</text>
  <text x="795" y="290" fill="#6b7280" font-size="8">read/write</text>

  <!-- ═══════════════ DEEPSPOK BRAIN — THE FLAT BUCKET ═══════════════ -->
  <g transform="translate(600, 440)">
    <!-- Broken hash background -->
    <rect x="-320" y="-100" width="640" height="200" rx="8" fill="url(#brokenHash)"/>
    <!-- Main container -->
    <rect x="-320" y="-100" width="640" height="200" rx="8" fill="#1e293b" fill-opacity="0.92" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="8,4"/>

    <!-- Title -->
    <text x="0" y="-74" text-anchor="middle" fill="#f9fafb" font-size="15" font-weight="700">deepspok Brain</text>
    <text x="0" y="-58" text-anchor="middle" fill="#6b7280" font-size="10">Supabase + pgvector · Single flat table · 45+ unstructured entries</text>

    <!-- Scattered "thoughts" to show flat chaos -->
    <g opacity="0.7">
      <!-- Row 1 -->
      <rect x="-290" y="-40" width="130" height="28" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="-225" y="-22" text-anchor="middle" fill="#9ca3af" font-size="8">"CEO directive: focus Q2"</text>

      <rect x="-145" y="-40" width="125" height="28" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="-83" y="-22" text-anchor="middle" fill="#9ca3af" font-size="8">"deploy v2.3 happened"</text>

      <rect x="-5" y="-40" width="115" height="28" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="53" y="-22" text-anchor="middle" fill="#9ca3af" font-size="8">"call Bob re: deal"</text>

      <rect x="125" y="-40" width="130" height="28" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="190" y="-22" text-anchor="middle" fill="#9ca3af" font-size="8">"API docs gap noted"</text>

      <!-- Row 2 -->
      <rect x="-290" y="0" width="115" height="28" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="-233" y="18" text-anchor="middle" fill="#9ca3af" font-size="8">"budget looks ok"</text>

      <rect x="-160" y="0" width="140" height="28" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="-90" y="18" text-anchor="middle" fill="#9ca3af" font-size="8">"stale: server issue Jan"</text>

      <rect x="-5" y="0" width="120" height="28" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="55" y="18" text-anchor="middle" fill="#9ca3af" font-size="8">"team morale check"</text>

      <rect x="130" y="0" width="125" height="28" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="193" y="18" text-anchor="middle" fill="#9ca3af" font-size="8">"thought: rebrand?"</text>
    </g>

    <!-- Row 3 — more clutter -->
    <g opacity="0.4">
      <rect x="-290" y="40" width="100" height="24" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="-240" y="56" text-anchor="middle" fill="#9ca3af" font-size="7">thought #32</text>
      <rect x="-175" y="40" width="100" height="24" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="-125" y="56" text-anchor="middle" fill="#9ca3af" font-size="7">thought #33</text>
      <rect x="-60" y="40" width="100" height="24" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="-10" y="56" text-anchor="middle" fill="#9ca3af" font-size="7">thought #34</text>
      <rect x="55" y="40" width="100" height="24" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="105" y="56" text-anchor="middle" fill="#9ca3af" font-size="7">thought #35</text>
      <rect x="170" y="40" width="100" height="24" rx="3" fill="#0f172a" stroke="#374151" stroke-width="0.5"/>
      <text x="220" y="56" text-anchor="middle" fill="#9ca3af" font-size="7">thought #36...</text>
    </g>

    <!-- "No type, no owner, no TTL" labels -->
    <text x="0" y="85" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="500" opacity="0.8">NO TYPE · NO OWNER · NO TTL · NO DOMAIN · NO TIER · VECTOR SEARCH ONLY</text>
  </g>

  <!-- ═══════════════ SUBSYSTEMS — ISOLATED ═══════════════ -->
  <!-- Isolation barrier -->
  <line x1="100" y1="600" x2="1100" y2="600" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,6" opacity="0.4"/>
  <text x="600" y="618" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="500" opacity="0.5" letter-spacing="3">NO CONNECTION — SUBSYSTEMS ISOLATED</text>

  <g transform="translate(0, 680)">
    <!-- HeadVroom -->
    <g transform="translate(180, 0)">
      <rect x="-100" y="-36" width="200" height="72" rx="6" fill="#1e293b" stroke="#374151" stroke-width="1"/>
      <text x="0" y="-10" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">HeadVroom</text>
      <text x="0" y="6" text-anchor="middle" fill="#64748b" font-size="9">Knowledge Graph</text>
      <text x="0" y="22" text-anchor="middle" fill="#ef444488" font-size="8">NOT CONNECTED</text>
    </g>

    <!-- PeoplePerson -->
    <g transform="translate(450, 0)">
      <rect x="-100" y="-36" width="200" height="72" rx="6" fill="#1e293b" stroke="#374151" stroke-width="1"/>
      <text x="0" y="-10" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">PeoplePerson</text>
      <text x="0" y="6" text-anchor="middle" fill="#64748b" font-size="9">CRM</text>
      <text x="0" y="22" text-anchor="middle" fill="#ef444488" font-size="8">NOT CONNECTED</text>
    </g>

    <!-- BeaverDam -->
    <g transform="translate(720, 0)">
      <rect x="-100" y="-36" width="200" height="72" rx="6" fill="#1e293b" stroke="#374151" stroke-width="1"/>
      <text x="0" y="-10" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">BeaverDam</text>
      <text x="0" y="6" text-anchor="middle" fill="#64748b" font-size="9">Assets / CMS</text>
      <text x="0" y="22" text-anchor="middle" fill="#ef444488" font-size="8">NOT CONNECTED</text>
    </g>

    <!-- counsel.team -->
    <g transform="translate(990, 0)">
      <rect x="-100" y="-36" width="200" height="72" rx="6" fill="#1e293b" stroke="#374151" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="0" y="-10" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">counsel.team</text>
      <text x="0" y="6" text-anchor="middle" fill="#64748b" font-size="9">Multi-model deliberation</text>
      <text x="0" y="22" text-anchor="middle" fill="#ef444488" font-size="8">UNUSED — ON SHELF</text>
    </g>
  </g>

  <!-- ═══════════════ PROBLEMS CALLOUT ═══════════════ -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="170" height="200" rx="4" fill="#0f172a" stroke="#ef444444" stroke-width="1"/>
    <text x="85" y="20" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700" letter-spacing="1">PROBLEMS</text>
    <line x1="10" y1="28" x2="160" y2="28" stroke="#ef444433" stroke-width="0.5"/>
    <text x="14" y="46" fill="#ef4444" font-size="8.5" opacity="0.8">Flat namespace</text>
    <text x="14" y="62" fill="#ef4444" font-size="8.5" opacity="0.8">No awareness tiers</text>
    <text x="14" y="78" fill="#ef4444" font-size="8.5" opacity="0.8">No ownership model</text>
    <text x="14" y="94" fill="#ef4444" font-size="8.5" opacity="0.8">No lifecycle / TTL</text>
    <text x="14" y="110" fill="#ef4444" font-size="8.5" opacity="0.8">No synthesis</text>
    <text x="14" y="126" fill="#ef4444" font-size="8.5" opacity="0.8">Subsystems isolated</text>
    <text x="14" y="142" fill="#ef4444" font-size="8.5" opacity="0.8">Echo chamber</text>
    <text x="14" y="158" fill="#ef4444" font-size="8.5" opacity="0.8">Level 1 only</text>
    <text x="14" y="174" fill="#ef4444" font-size="8.5" opacity="0.8">Pull-only — no push</text>
    <text x="14" y="190" fill="#ef4444" font-size="8.5" opacity="0.8">No decision architecture</text>
  </g>

  <!-- Endsley level indicator -->
  <g transform="translate(1020, 340)">
    <rect x="0" y="0" width="140" height="90" rx="4" fill="#0f172a" stroke="#374151" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">ENDSLEY LEVELS</text>
    <line x1="10" y1="28" x2="130" y2="28" stroke="#37415166" stroke-width="0.5"/>
    <rect x="10" y="36" width="120" height="16" rx="2" fill="#ef444433" stroke="#ef4444" stroke-width="0.5"/>
    <text x="70" y="48" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">L1: Perception ✓</text>
    <rect x="10" y="56" width="120" height="16" rx="2" fill="#0f172a" stroke="#374151" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="70" y="68" text-anchor="middle" fill="#4b5563" font-size="8">L2: Comprehension ✗</text>
    <rect x="10" y="76" width="120" height="16" rx="2" fill="#0f172a" stroke="#374151" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="70" y="88" text-anchor="middle" fill="#4b5563" font-size="8">L3: Projection ✗</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="805" text-anchor="middle" fill="#4b5563" font-size="10" font-style="italic">"A log pretending to be an executive."</text>

  <!-- Version label -->
  <text x="600" y="870" text-anchor="middle" fill="#374151" font-size="9">SPOK BRAIN REDESIGN · CURRENT STATE · v1.0 · March 2026</text>
</svg>